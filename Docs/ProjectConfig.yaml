# Tile Loop Factory — Project Configuration
# Generated by /uw-cmd-setup-project on 2026-07-21.
# This drives which uw-* skills activate and how. Keep it up to date as decisions change.

project_name: Tile Loop Factory
unity_version: 6000.4.9f1
ai_mode: guided

# --- Rendering / Build ---
render_pipeline: Built-in
# NOTE: Assets/Settings contains orphaned URP asset files (Mobile_RPAsset, PC_RPAsset,
# UniversalRenderPipelineGlobalSettings) but com.unity.render-pipelines.universal is NOT
# installed (checked Packages/manifest.json + packages-lock.json). Treated as Built-in RP.
# Flag for cleanup if confirmed unused.
color_space: Linear
scripting_backend: IL2CPP
target_platforms:
  - Android
  # Add iOS/other platforms here once confirmed.

# --- Architecture ---
architecture_pattern: so-first   # ScriptableObject-first (data containers, event channels)
ui_system: UGUI                  # Layer Lab UGUI prefabs are the primary UI kit
networking: none                 # Single-player puzzle game, no multiplayer/backend
feel_tools: DOTween               # Already installed at Assets/Plugins/Demigiant/DOTween

# --- Folder Strategy ---
folder_strategy: hybrid
# Existing folders (Assets/Scripts, Assets/Scenes, Assets/Art, Assets/FactoryModel,
# Assets/Settings, Assets/UI Toolkit, Assets/Resources, Assets/Layer Lab, Assets/Plugins,
# Assets/TextMesh Pro) are left in place as-is — not migrated.
# All NEW feature work goes under Assets/_Project/ (Core/, Features/, Art/, Audio/, UI/,
# Prefabs/, Scenes/, Tests/) per uw-unity-feature-scaffold conventions.

# --- Packages (from Packages/manifest.json, verified 2026-07-21) ---
packages:
  - com.unity.collab-proxy: 2.12.4
  - com.unity.feature.2d: 2.0.2
  - com.unity.ide.rider: 3.0.40
  - com.unity.ide.visualstudio: 2.0.27
  - com.unity.inputsystem: 1.19.0
  - com.unity.multiplayer.center: 1.0.1
  - com.unity.splines: 2.8.4
  - com.unity.test-framework: 1.6.0
  - com.unity.timeline: 1.8.12
  - com.unity.ugui: 2.0.0
  - com.unity.visualscripting: 1.9.11

third_party:
  - DOTween (Demigiant) — Assets/Plugins/Demigiant/DOTween
  - Layer Lab GUI Pro - FantasyHero — Assets/Layer Lab
  - TextMesh Pro — Assets/TextMesh Pro

# --- MCP ---
mcp:
  unity_mcp: true      # coplay-mcp connected, but Unity Editor was not running during setup
  github_mcp: false     # no GitHub MCP server or gh CLI available in this environment

# --- Docs ---
prompt_logging: false

# --- Game Scope (from docs/ProcessPlan.txt) ---
# Tile Loop Factory: 2 common levels + 1 bonus round.
# Core loop: tap tile -> holding tray slot -> auto-reorder by type -> auto-clear 3 matched tiles.
# Lose: tray slots fully jammed. Win: clear all tiles.
# Bonus level unlocks after level 2: one-click sequential auto-clear.
